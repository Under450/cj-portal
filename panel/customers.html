<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Customers — CJ Control</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
</head>
<body>
  <a href="index.html" class="back-link">← Back</a>
  <div class="header">
    <div>
      <div class="header-label">FMM</div>
      <div class="header-title">Customers</div>
    </div>
    <div id="count" style="font-size: 13px; color: var(--text-dim);"></div>
  </div>

  <input type="text" id="search" class="search-input" placeholder="Search name or email…">
  <div id="list" class="loading">Loading…</div>

  <script src="shared.js"></script>
  <script>
    let allCustomers = [];

    async function load() {
      const data = await callFn('panelGetAllCustomers');
      const listEl = document.getElementById('list');

      if (!data || !data.customers?.length) {
        listEl.className = 'empty';
        listEl.textContent = 'No customers found.';
        return;
      }

      allCustomers = data.customers;
      document.getElementById('count').textContent = `${allCustomers.length} total`;
      renderList(allCustomers);
    }

    function renderList(customers) {
      const listEl = document.getElementById('list');
      if (!customers.length) {
        listEl.className = 'empty';
        listEl.textContent = 'No matches.';
        return;
      }

      listEl.className = 'list';
      listEl.innerHTML = customers.map(c => {
        const statusClass = c.idStatus === 'approved' ? 'approved' : c.idStatus === 'declined' ? 'declined' : 'pending';
        return `<div class="list-row">
          <div class="list-row-title">${escapeHtml(c.name || 'No name')}</div>
          <div class="list-row-sub">${escapeHtml(c.email)} ${c.tier ? '· ' + escapeHtml(c.tier) : ''}</div>
          <div class="list-row-meta">
            <span class="status-badge ${statusClass}">${c.idStatus || 'unknown'}</span>
            ${c.createdAt ? ' · ' + formatTime(new Date(c.createdAt)) : ''}
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      if (!q) return renderList(allCustomers);
      renderList(allCustomers.filter(c =>
        (c.name || '').toLowerCase().includes(q) ||
        (c.email || '').toLowerCase().includes(q)
      ));
    });

    auth.onAuthStateChanged(u => { if (u?.uid === ALLOWED_UID) load(); });
  </script>
</body>
</html>
