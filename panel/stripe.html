<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Stripe — CJ Control</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <a href="index.html" class="back-link">← Back</a>
  <div class="header">
    <div>
      <div class="header-label">FMM</div>
      <div class="header-title">Stripe Dashboard</div>
    </div>
  </div>

  <!-- Balance summary -->
  <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
    <div style="flex: 1; background: var(--tile); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px;">
      <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">AVAILABLE</div>
      <div id="available" style="font-size: 22px; color: var(--amber); font-weight: 500; margin-top: 4px;">—</div>
    </div>
    <div style="flex: 1; background: var(--tile); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px;">
      <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">PENDING</div>
      <div id="pending" style="font-size: 22px; color: var(--text-dim); font-weight: 500; margin-top: 4px;">—</div>
    </div>
  </div>

  <!-- Balance chart -->
  <div class="chart-container">
    <canvas id="balanceChart" height="160"></canvas>
  </div>

  <!-- Recent events -->
  <div class="section-title">RECENT EVENTS</div>
  <div id="events" class="loading">Loading…</div>

  <script src="shared.js"></script>
  <script>
    let chart = null;

    async function load() {
      const [balance, events] = await Promise.all([
        callFn('panelGetStripeBalance'),
        callFn('panelGetStripeEvents'),
      ]);

      if (balance) {
        document.getElementById('available').textContent = formatGBP(balance.available);
        document.getElementById('pending').textContent = formatGBP(balance.pending);

        // Render chart if history available
        if (balance.history && balance.history.length) {
          renderChart(balance.history);
        }
      }

      const eventsEl = document.getElementById('events');
      if (!events || !events.events?.length) {
        eventsEl.className = 'empty';
        eventsEl.textContent = 'No recent events.';
      } else {
        const lastViewed = events.lastViewed ? new Date(events.lastViewed) : new Date(0);
        eventsEl.className = 'list';
        eventsEl.innerHTML = events.events.map(e => {
          const isNew = new Date(e.created) > lastViewed;
          return `<div class="list-row ${isNew ? 'new' : ''}">
            <div class="list-row-title">${escapeHtml(e.type)}</div>
            <div class="list-row-sub">${e.amount ? formatGBP(e.amount) : ''} ${escapeHtml(e.description || '')}</div>
            <div class="list-row-meta">${formatTime(new Date(e.created))}</div>
          </div>`;
        }).join('');
      }

      await markViewed('stripe_events');
    }

    function renderChart(history) {
      const ctx = document.getElementById('balanceChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: history.map(h => h.date),
          datasets: [{
            data: history.map(h => h.balance),
            borderColor: '#d4a04c',
            backgroundColor: 'rgba(212, 160, 76, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHitRadius: 10,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 6 },
              grid: { color: 'rgba(255,255,255,0.05)' },
              border: { color: '#262626' },
            },
            y: {
              ticks: {
                color: '#555',
                font: { size: 10 },
                callback: v => '£' + v.toLocaleString(),
              },
              grid: { color: 'rgba(255,255,255,0.05)' },
              border: { color: '#262626' },
            }
          }
        }
      });
    }

    auth.onAuthStateChanged(u => { if (u?.uid === ALLOWED_UID) load(); });
  </script>
</body>
</html>
