<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Didit ID Status — CJ Control</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
  <style>
    .tabs-didit { flex-wrap: wrap; }
    .tabs-didit .tab { min-width: 0; font-size: 10px; line-height: 1.3; }
    .tabs-didit .tab .tab-count { display: block; font-size: 13px; font-weight: 600; margin-top: 2px; }
    .filter-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
    .list-row-pkg { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back</a>
  <div class="header">
    <div>
      <div class="header-label">FMM</div>
      <div class="header-title">ID Verification Status</div>
    </div>
    <div id="totalCount" style="font-size: 13px; color: var(--amber); font-weight: 500;"></div>
  </div>

  <div id="tabs" class="tabs tabs-didit" style="display:none;">
    <button class="tab active" data-filter="all">All<span class="tab-count" id="c-all">0</span></button>
    <button class="tab" data-filter="pending">Pending<span class="tab-count" id="c-pending">0</span></button>
    <button class="tab" data-filter="not_started">Not Started<span class="tab-count" id="c-not_started">0</span></button>
    <button class="tab" data-filter="declined">Declined<span class="tab-count" id="c-declined">0</span></button>
    <button class="tab" data-filter="approved">Approved<span class="tab-count" id="c-approved">0</span></button>
  </div>

  <div id="filterMeta" class="filter-meta" style="display:none;"></div>
  <div id="list" class="loading">Loading…</div>

  <script src="shared.js"></script>
  <script>
    let allCustomers = [];
    let activeFilter = 'all';

    function statusLabel(s) {
      return ({
        approved: 'Approved',
        pending: 'Pending',
        not_started: 'Not Started',
        declined: 'Declined'
      })[s] || s;
    }

    function render() {
      const listEl = document.getElementById('list');
      const filtered = activeFilter === 'all'
        ? allCustomers
        : allCustomers.filter(c => c.idStatus === activeFilter);

      const metaEl = document.getElementById('filterMeta');
      metaEl.style.display = '';
      metaEl.textContent = activeFilter === 'all'
        ? `Showing all ${filtered.length} active customers`
        : `Showing ${filtered.length} ${statusLabel(activeFilter).toLowerCase()}`;

      if (!filtered.length) {
        listEl.className = 'empty';
        listEl.textContent = activeFilter === 'all'
          ? 'No active customers found.'
          : `No customers with status: ${statusLabel(activeFilter)}.`;
        return;
      }

      listEl.className = 'list';
      listEl.innerHTML = filtered.map(c => {
        const updated = c.idStatusUpdatedAt
          ? ' · Updated ' + formatTime(new Date(c.idStatusUpdatedAt))
          : (c.createdAt ? ' · Signed up ' + formatTime(new Date(c.createdAt)) : '');
        return `
          <div class="list-row">
            <div class="list-row-title">${escapeHtml(c.name || c.email)}</div>
            <div class="list-row-sub">${escapeHtml(c.email)}</div>
            <div class="list-row-pkg">${escapeHtml(c.package)}</div>
            <div class="list-row-meta">
              <span class="status-badge ${c.idStatus}">${statusLabel(c.idStatus)}</span>${updated}
            </div>
          </div>
        `;
      }).join('');
    }

    function setActive(filter) {
      activeFilter = filter;
      document.querySelectorAll('.tabs-didit .tab').forEach(t => {
        t.classList.toggle('active', t.dataset.filter === filter);
      });
      render();
    }

    async function load() {
      const data = await callFn('panelGetDiditQueue');

      if (!data || !Array.isArray(data.customers)) {
        document.getElementById('list').className = 'empty';
        document.getElementById('list').textContent = 'Failed to load customers.';
        return;
      }

      allCustomers = data.customers;
      const counts = data.counts || { all: 0, approved: 0, pending: 0, not_started: 0, declined: 0 };

      document.getElementById('totalCount').textContent = `${counts.pending} pending`;
      document.getElementById('tabs').style.display = '';
      document.getElementById('c-all').textContent = counts.all;
      document.getElementById('c-pending').textContent = counts.pending;
      document.getElementById('c-not_started').textContent = counts.not_started;
      document.getElementById('c-declined').textContent = counts.declined;
      document.getElementById('c-approved').textContent = counts.approved;

      document.querySelectorAll('.tabs-didit .tab').forEach(t => {
        t.addEventListener('click', () => setActive(t.dataset.filter));
      });

      render();
      await markViewed('didit');
    }

    auth.onAuthStateChanged(u => { if (u?.uid === ALLOWED_UID) load(); });
  </script>
</body>
</html>
