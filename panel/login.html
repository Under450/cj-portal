<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CJ Control — Sign in</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div style="min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5rem;">
    <div style="text-align: center;">
      <div class="header-label">CJ CONTROL</div>
      <div class="header-title" style="margin-top: 8px;">Sign in</div>
    </div>
    <input type="email" id="email" placeholder="Email" class="search-input" style="max-width: 280px;">
    <input type="password" id="password" placeholder="Password" class="search-input" style="max-width: 280px;">
    <button onclick="signIn()" style="width: 100%; max-width: 280px; padding: 12px; background: var(--amber); color: var(--bg); border: none; border-radius: 8px; font-weight: 500; font-size: 14px; cursor: pointer; font-family: inherit;">Continue</button>
    <div id="error" style="color: var(--red); font-size: 12px; min-height: 16px;"></div>
    <a href="#" onclick="resetPw()" style="font-size: 12px; color: var(--muted); text-decoration: underline; cursor: pointer;">Forgot password?</a>
    <div id="reset-msg" style="color: var(--green, #4ade80); font-size: 12px; min-height: 16px;"></div>
  </div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCToSDWiFy0zjDo4Amfe4_IV8z7N54jrQU",
      authDomain: "forward-my-mail.firebaseapp.com",
      projectId: "forward-my-mail",
      storageBucket: "forward-my-mail.firebasestorage.app",
      messagingSenderId: "933044287958",
      appId: "1:933044287958:web:fa3a707dbec62b24e74c77"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user && user.uid === 'pY80AVfY9teBlcBD8b8EUo3rORm2') {
        window.location.href = 'index.html';
      }
    });

    async function signIn() {
      const email = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      errEl.textContent = '';
      try {
        const cred = await auth.signInWithEmailAndPassword(email, pw);
        if (cred.user.uid !== 'pY80AVfY9teBlcBD8b8EUo3rORm2') {
          await auth.signOut();
          errEl.textContent = 'Not authorised.';
        }
      } catch (e) {
        errEl.textContent = e.code + ': ' + e.message;
      }
    }

    async function resetPw() {
      const email = document.getElementById('email').value || 'caj@me.com';
      const msgEl = document.getElementById('reset-msg');
      try {
        await auth.sendPasswordResetEmail(email);
        msgEl.textContent = 'Reset link sent to ' + email;
      } catch (e) {
        msgEl.textContent = e.message;
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
