<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Inbox — CJ Control</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
</head>
<body>
  <a href="index.html" class="back-link" id="back-link">← Back</a>
  <div class="header">
    <div>
      <div class="header-label">FMM</div>
      <div class="header-title" id="page-title">Inbox</div>
    </div>
  </div>

  <div id="content" class="loading">Loading…</div>

  <script src="shared.js"></script>
  <script>
    let emails = [];

    async function load() {
      const data = await callFn('panelGetInbox');
      const contentEl = document.getElementById('content');

      if (data?.notConfigured) {
        contentEl.innerHTML = `<div class="not-configured">
          <div class="not-configured-icon">✉</div>
          <div class="not-configured-title">Setup needed</div>
          <div class="not-configured-sub">Gmail API not configured yet.<br>Connect info@forwardmymail.co.uk to enable.</div>
        </div>`;
        return;
      }

      if (!data || !data.messages?.length) {
        contentEl.className = 'empty';
        contentEl.textContent = 'No emails.';
        return;
      }

      emails = data.messages;
      renderList();
      await markViewed('inbox');
    }

    function renderList() {
      const contentEl = document.getElementById('content');
      document.getElementById('page-title').textContent = 'Inbox';
      document.getElementById('back-link').href = 'index.html';
      document.getElementById('back-link').onclick = null;

      contentEl.className = 'list';
      contentEl.innerHTML = emails.map((e, i) => `
        <div class="list-row ${e.unread ? 'new' : ''}" onclick="openEmail(${i})">
          <div class="list-row-title">${escapeHtml(e.from)}</div>
          <div class="list-row-sub">${escapeHtml(e.subject)}</div>
          <div class="list-row-meta">${escapeHtml(e.preview || '')} · ${formatTime(new Date(e.date))}</div>
        </div>
      `).join('');
    }

    function openEmail(idx) {
      const e = emails[idx];
      const contentEl = document.getElementById('content');
      document.getElementById('page-title').textContent = 'Email';
      document.getElementById('back-link').href = '#';
      document.getElementById('back-link').onclick = (ev) => { ev.preventDefault(); renderList(); };

      contentEl.className = '';
      contentEl.innerHTML = `<div class="email-reader">
        <div class="email-reader-header">
          <div class="email-reader-subject">${escapeHtml(e.subject)}</div>
          <div class="email-reader-from">${escapeHtml(e.from)}</div>
          <div class="email-reader-date">${formatTime(new Date(e.date))}</div>
        </div>
        <div class="email-reader-body">${escapeHtml(e.body || e.preview || 'No content')}</div>
      </div>`;
    }

    auth.onAuthStateChanged(u => { if (u?.uid === ALLOWED_UID) load(); });
  </script>
</body>
</html>
