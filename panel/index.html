<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <title>CJ Control</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    .tabs-didit { flex-wrap: wrap; }
    .tabs-didit .tab { min-width: 0; font-size: 10px; line-height: 1.3; }
    .tabs-didit .tab .tab-count { display: block; font-size: 13px; font-weight: 600; margin-top: 2px; }
    .filter-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
    .list-row-pkg { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  </style>
</head>
<body>

  <!-- ===== HOME VIEW ===== -->
  <div id="home-view">
    <div class="header">
      <div>
        <div class="header-label">CJ CONTROL</div>
        <div class="header-title" id="brand-title">Forward My Mail</div>
      </div>
      <div class="avatar" onclick="signOut()">CJ</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-brand="fmm">FMM</button>
      <button class="tab" data-brand="bergason">Bergason</button>
      <button class="tab" data-brand="aventus">Aventus</button>
      <button class="tab" data-brand="velvet">Velvet</button>
    </div>

    <div class="grid" id="tile-grid"></div>

    <div class="sync-bar">
      <span>Last synced</span>
      <span class="sync-bar-value" id="sync-time">—</span>
    </div>
  </div>

  <!-- ===== STRIPE SECTION ===== -->
  <div class="detail-section" id="section-stripe">
    <a href="#" class="back-link" onclick="showHome(); return false;">← Back</a>
    <div class="header">
      <div>
        <div class="header-label">FMM</div>
        <div class="header-title">Stripe Dashboard</div>
      </div>
    </div>
    <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
      <div style="flex: 1; background: var(--tile); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px;">
        <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">AVAILABLE</div>
        <div id="spa-available" style="font-size: 22px; color: var(--amber); font-weight: 500; margin-top: 4px;">—</div>
      </div>
      <div style="flex: 1; background: var(--tile); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px;">
        <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">PENDING</div>
        <div id="spa-pending" style="font-size: 22px; color: var(--text-dim); font-weight: 500; margin-top: 4px;">—</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="spa-balanceChart" height="160"></canvas>
    </div>
    <div class="section-title">RECENT PAYMENTS</div>
    <div id="spa-events" class="loading">Loading…</div>
  </div>

  <!-- ===== BALANCE SECTION (reuses stripe) ===== -->

  <!-- ===== SIGNUPS SECTION ===== -->
  <div class="detail-section" id="section-signups">
    <a href="#" class="back-link" onclick="showHome(); return false;">← Back</a>
    <div class="header">
      <div>
        <div class="header-label">FMM</div>
        <div class="header-title">New signups</div>
      </div>
    </div>
    <div id="spa-signups-list" class="loading">Loading…</div>
  </div>

  <!-- ===== INBOX SECTION ===== -->
  <div class="detail-section" id="section-inbox">
    <a href="#" class="back-link" id="spa-inbox-back" onclick="showHome(); return false;">← Back</a>
    <div class="header">
      <div>
        <div class="header-label">FMM</div>
        <div class="header-title" id="spa-inbox-title">Inbox</div>
      </div>
    </div>
    <div id="spa-inbox-content" class="loading">Loading…</div>
  </div>

  <!-- ===== CUSTOMERS SECTION ===== -->
  <div class="detail-section" id="section-customers">
    <a href="#" class="back-link" onclick="showHome(); return false;">← Back</a>
    <div class="header">
      <div>
        <div class="header-label">FMM</div>
        <div class="header-title">Customers</div>
      </div>
      <div id="spa-cust-count" style="font-size: 13px; color: var(--text-dim);"></div>
    </div>
    <input type="text" id="spa-cust-search" class="search-input" placeholder="Search name or email…">
    <div id="spa-cust-list" class="loading">Loading…</div>
  </div>

  <!-- ===== DIDIT SECTION ===== -->
  <div class="detail-section" id="section-didit">
    <a href="#" class="back-link" onclick="showHome(); return false;">← Back</a>
    <div class="header">
      <div>
        <div class="header-label">FMM</div>
        <div class="header-title">ID Verification Status</div>
      </div>
      <div id="spa-didit-total" style="font-size: 13px; color: var(--amber); font-weight: 500;"></div>
    </div>
    <div id="spa-didit-tabs" class="tabs tabs-didit" style="display:none;">
      <button class="tab active" data-filter="all">All<span class="tab-count" id="spa-c-all">0</span></button>
      <button class="tab" data-filter="pending">Pending<span class="tab-count" id="spa-c-pending">0</span></button>
      <button class="tab" data-filter="not_started">Not Started<span class="tab-count" id="spa-c-not_started">0</span></button>
      <button class="tab" data-filter="declined">Declined<span class="tab-count" id="spa-c-declined">0</span></button>
      <button class="tab" data-filter="approved">Approved<span class="tab-count" id="spa-c-approved">0</span></button>
    </div>
    <div id="spa-didit-meta" class="filter-meta" style="display:none;"></div>
    <div id="spa-didit-list" class="loading">Loading…</div>
  </div>

  <script src="shared.js"></script>
  <script src="tiles.js"></script>
</body>
</html>
