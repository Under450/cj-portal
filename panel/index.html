<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <title>CJ Control</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-label">CJ CONTROL</div>
      <div class="header-title" id="brand-title">Forward My Mail</div>
    </div>
    <div class="avatar" onclick="signOut()">CJ</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-brand="fmm">FMM</button>
    <button class="tab" data-brand="bergason">Bergason</button>
    <button class="tab" data-brand="aventus">Aventus</button>
    <button class="tab" data-brand="velvet">Velvet</button>
  </div>

  <div class="grid" id="tile-grid"></div>

  <div class="sync-bar">
    <span>Last synced</span>
    <span class="sync-bar-value" id="sync-time">—</span>
  </div>

  <script src="shared.js"></script>
  <script src="tiles.js"></script>
</body>
</html>
